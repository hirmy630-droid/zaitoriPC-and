<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>材料取りツール</title>
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="材料取りツール">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

  <style>
    :root {
      --bg: #000000;
      --border: #3a3a3c;
      --text: #ffffff;
      --muted: #8e8e93;
      --accent: #ff9f0a;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
      overflow-x: hidden;
    }
    .header {
      padding: 12px 16px 8px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: baseline; justify-content: space-between; gap: 12px;
      background: var(--bg);
    }
    .title { font-size: 18px; font-weight: 700; }
    .sub { font-size: 12px; color: var(--muted); }
    .tabs-wrap {
      position: sticky; top: 0; z-index: 20; padding: 10px 12px;
      background: rgba(0,0,0,0.92); backdrop-filter: blur(14px); border-bottom: 1px solid var(--border);
    }
    .tabs {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; max-width: 1200px; margin: 0 auto;
    }
    .tab {
      appearance: none; border: 1px solid var(--border); background: #2c2c2e; color: var(--muted);
      border-radius: 12px; padding: 10px 8px; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap;
    }
    .tab.active { color: var(--text); border-color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent); background: #3a3a3c; }
    .panes { max-width: 1366px; margin: 0 auto; width: 100%; }
    .pane { display: none; }
    .pane.active { display: block; }
    iframe { width: 100%; min-height: 900px; border: 0; background: var(--bg); display: block; }
    @media (max-width: 820px) { .tabs { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">材料取りツール</div>
    <div class="sub">4タブ版</div>
  </div>
  <div class="tabs-wrap">
    <div class="tabs">
      <button class="tab active" data-target="yakumono">役物材料</button>
      <button class="tab" data-target="zairyo">材料取り</button>
      <button class="tab" data-target="kanamono">金物割付</button>
      <button class="tab" data-target="slope">勾配</button>
    </div>
  </div>
  <div class="panes">
    <section class="pane active" id="pane-yakumono"><iframe src="yakumono.html" data-name="yakumono"></iframe></section>
    <section class="pane" id="pane-zairyo"><iframe src="zairyo.html" data-name="zairyo"></iframe></section>
    <section class="pane" id="pane-kanamono"><iframe src="kanamono.html" data-name="kanamono"></iframe></section>
    <section class="pane" id="pane-slope"><iframe src="slope.html" data-name="slope"></iframe></section>
  </div>
<script>
const tabs = Array.from(document.querySelectorAll('.tab'));
const panes = {
  yakumono: document.getElementById('pane-yakumono'),
  zairyo: document.getElementById('pane-zairyo'),
  kanamono: document.getElementById('pane-kanamono'),
  slope: document.getElementById('pane-slope')
};
const frames = {};
document.querySelectorAll('iframe[data-name]').forEach(frame => {
  frames[frame.dataset.name] = frame;
  frame.addEventListener('load', () => requestHeight(frame.dataset.name));
});
function requestHeight(target) {
  const frame = frames[target];
  if (!frame || !frame.contentWindow) return;
  try { frame.contentWindow.postMessage({ type: 'requestHeight' }, '*'); } catch (e) {}
}
function activate(target) {
  tabs.forEach(btn => btn.classList.toggle('active', btn.dataset.target === target));
  Object.entries(panes).forEach(([key, pane]) => pane.classList.toggle('active', key === target));
  setTimeout(() => requestHeight(target), 30);
  setTimeout(() => requestHeight(target), 220);
}
tabs.forEach(btn => btn.addEventListener('click', () => activate(btn.dataset.target)));
window.addEventListener('message', (event) => {
  const data = event.data;
  if (!data || data.type !== 'toolHeight' || !frames[data.name]) return;
  frames[data.name].style.height = Math.max(780, Number(data.height || 0) + 8) + 'px';
});
setTimeout(() => requestHeight('yakumono'), 300);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      const reg = await navigator.serviceWorker.register('./sw.js');
      if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener('statechange', () => {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) {
            nw.postMessage({ type: 'SKIP_WAITING' });
          }
        });
      });
      let refreshed = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshed) return;
        refreshed = true;
        location.reload();
      });
    } catch (e) { console.error(e); }
  });
}
</script>
</body>
</html>
