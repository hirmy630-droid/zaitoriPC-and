<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>勾配</title>
  <meta name="theme-color" content="#000000">
  <style>
    :root{
      --bg:#000000;
      --card:#18181b;
      --card2:#27272a;
      --line:#3f3f46;
      --text:#ffffff;
      --muted:#a1a1aa;
      --orange:#f97316;
      --blue:#3b82f6;
      --green:#22c55e;
      --silver:#c0c0c0;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif}
    body{padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
    .wrap{max-width:1360px;margin:0 auto;padding:12px}
    .header{display:flex;justify-content:space-between;align-items:baseline;padding:0 4px 10px;border-bottom:1px solid var(--line);margin-bottom:14px}
    .header h1{margin:0;font-size:17px;font-weight:700}
    .header .sub{font-size:14px;color:#71717a;font-weight:700;text-transform:uppercase}
    .main{display:block}
    @media (min-width:900px){
      .main{display:grid;grid-template-columns:minmax(0,1.03fr) minmax(420px,0.97fr);gap:16px;align-items:start}
    }
    .panel{background:var(--card);border:2px solid #27272a;border-radius:24px;overflow:hidden;box-shadow:0 12px 28px rgba(0,0,0,.35)}
    .row{display:flex;border-bottom:1px solid var(--line)}
    .cell{position:relative;flex:1;min-height:48px;display:flex;align-items:center;justify-content:center;padding:0 14px;border-right:1px solid var(--line);cursor:pointer}
    .cell:last-child{border-right:0}
    .cell.big{min-height:58px}
    .cell.active{background:#27272a;box-shadow:inset 0 0 0 2px var(--orange)}
    .label{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;font-weight:700;color:var(--silver)}
    .field{width:100%;text-align:center;background:transparent;border:0;color:var(--text);font-weight:800;font-size:22px;outline:none}
    .field.big{font-size:28px}
    .field::placeholder{color:#71717a}
    .results{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
    .result{position:relative;background:var(--card);border-radius:20px;padding:10px 14px;border:2px solid var(--line);box-shadow:0 10px 20px rgba(0,0,0,.25);cursor:pointer;min-height:92px}
    .result.active{box-shadow:inset 0 0 0 2px var(--orange),0 10px 20px rgba(0,0,0,.25)}
    .result .cap{font-size:13px;font-weight:700;color:#d4d4d8}
    .result .inputish{margin-top:4px;text-align:left}
    .result .value-field{width:100%;background:transparent;border:0;outline:none;font-size:30px;font-weight:900}
    .result.green{border-color:var(--green)}
    .result.blue{border-color:var(--blue)}
    .result.green .value-field{color:#4ade80}
    .result.blue .value-field{color:#60a5fa}
    .note{margin-top:10px;font-size:12px;color:var(--muted);line-height:1.5;padding:0 2px}
    .keypad{display:grid;grid-template-columns:repeat(4,1fr);background:var(--card2)}
    .key{height:52px;border:0;border-right:1px solid var(--line);border-bottom:1px solid var(--line);background:#18181b;color:#fff;font-size:22px;font-weight:700}
    .key.gray{background:#3f3f46}
    .key.orange{background:linear-gradient(180deg,#e5e5ea 0%,#c7c7cc 100%);color:#27272a;font-size:18px}
    .preview-card{background:rgba(24,24,27,.9);border-radius:24px;border:1px solid #27272a;padding:14px;box-shadow:0 10px 20px rgba(0,0,0,.25)}
    .preview-title{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:800;color:#e4e4e7;margin-bottom:10px;text-transform:uppercase}
    .dot{width:6px;height:6px;border-radius:999px;background:var(--blue)}
    .mini{display:flex;justify-content:flex-end;margin-bottom:8px}
    .mini svg{width:82px;height:50px;color:#d4d4d8}
    .svgbox{display:flex;justify-content:center;align-items:center;background:rgba(0,0,0,.22);border:1px solid #27272a;border-radius:18px;height:320px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>勾配</h1>
      <div class="sub">KYOWA ROOF</div>
    </div>

    <div class="main">
      <div>
        <div class="panel">
          <div class="row">
            <div class="cell" id="cell-y" onclick="setActive('y')">
              <div class="label">勾配(100→↕)</div>
              <input id="input-y" class="field" placeholder="0" inputmode="none" readonly>
            </div>
            <div class="cell" id="cell-x" onclick="setActive('x')">
              <div class="label">角度</div>
              <input id="input-x" class="field" placeholder="0" inputmode="none" readonly>
            </div>
          </div>
          <div class="row">
            <div class="cell big" id="cell-c" onclick="setActive('c')">
              <div class="label">水平寸法</div>
              <input id="input-c" class="field big" placeholder="0" inputmode="none" readonly>
            </div>
          </div>
          <div class="keypad">
            <button class="key" onclick="press('7')">7</button>
            <button class="key" onclick="press('8')">8</button>
            <button class="key" onclick="press('9')">9</button>
            <button class="key gray" onclick="press('C')">C</button>

            <button class="key" onclick="press('4')">4</button>
            <button class="key" onclick="press('5')">5</button>
            <button class="key" onclick="press('6')">6</button>
            <button class="key gray" onclick="press('AC')">AC</button>

            <button class="key" onclick="press('1')">1</button>
            <button class="key" onclick="press('2')">2</button>
            <button class="key" onclick="press('3')">3</button>
            <button class="key orange" onclick="press('ENTER')">入力切替</button>

            <button class="key" onclick="press('0')">0</button>
            <button class="key" onclick="press('00')">00</button>
            <button class="key" onclick="press('.')">.</button>
            <button class="key" onclick="press('+/-')">+/-</button>
          </div>
        </div>

        <div class="results">
          <div class="result green" id="result-a" onclick="setActive('a')">
            <div class="cap">勾配幅</div>
            <div class="inputish">
              <input id="input-a" class="value-field" placeholder="0" inputmode="none" readonly>
            </div>
          </div>
          <div class="result blue" id="result-b" onclick="setActive('b')">
            <div class="cap">斜辺</div>
            <div class="inputish">
              <input id="input-b" class="value-field" placeholder="0" inputmode="none" readonly>
            </div>
          </div>
        </div>

        <div class="note">水平寸法を基準に、勾配幅と斜辺も入力できます。水平寸法 + 勾配幅、または水平寸法 + 斜辺を入れると他の値を自動計算します。</div>
      </div>

      <div class="preview-card">
        <div class="preview-title"><span class="dot"></span>プレビュー</div>
        <div class="mini">
          <svg viewBox="0 0 80 50">
            <path d="M 10 35 L 60 35 L 60 10 Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
            <text x="35" y="48" font-size="14" text-anchor="middle" fill="currentColor" font-weight="bold">100</text>
            <text x="65" y="25" font-size="14" text-anchor="start" fill="currentColor" font-weight="bold" id="mini-y">y</text>
          </svg>
        </div>
        <div class="svgbox">
          <svg viewBox="0 0 320 200" id="preview-svg" style="width:100%;height:100%;padding:12px;">
            <path d="M 40 160 L 260 160" stroke="#f97316" stroke-width="4" stroke-linecap="round" fill="none" />
            <text x="150" y="185" fill="#fb923c" font-size="18" text-anchor="middle" font-weight="bold" id="txt-c">-</text>
            <path id="path-a" d="M 260 160 L 260 120" stroke="#22c55e" stroke-width="4" stroke-linecap="round" fill="none" />
            <text id="txt-a" x="272" y="140" fill="#4ade80" font-size="18" dominant-baseline="middle" font-weight="bold">-</text>
            <path id="path-b" d="M 40 160 L 260 120" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" fill="none" />
            <text id="txt-b" x="130" y="120" fill="#60a5fa" font-size="18" text-anchor="middle" font-weight="bold" style="filter: drop-shadow(0px 0px 2px rgba(0,0,0,0.8));">-</text>
          </svg>
        </div>
      </div>
    </div>
  </div>

<script>
const PAGE_NAME = 'slope';
const state = { y:'', x:'', c:'', a:'', b:'', active:'c', overwrite:true, driver:'y' };

const ids = {
  y: document.getElementById('input-y'),
  x: document.getElementById('input-x'),
  c: document.getElementById('input-c'),
  a: document.getElementById('input-a'),
  b: document.getElementById('input-b'),
  miniY: document.getElementById('mini-y'),
  txtC: document.getElementById('txt-c'),
  txtA: document.getElementById('txt-a'),
  txtB: document.getElementById('txt-b'),
  pathA: document.getElementById('path-a'),
  pathB: document.getElementById('path-b'),
};

function fmt(v, decimals=0){
  if (v === '' || v === null || v === undefined) return '';
  const n = Number(String(v).replace(/,/g,''));
  if (Number.isNaN(n)) return '';
  return n.toLocaleString('ja-JP', {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals
  }).replace(/\.00$/,'');
}
function clean(v){ return String(v).replace(/,/g,''); }
function num(v){
  const n = parseFloat(clean(v));
  return Number.isFinite(n) ? n : null;
}
function roundInt(n){ return Math.round(n); }
function setActive(key){
  state.active = key;
  state.overwrite = true;
  ['y','x','c'].forEach(k => document.getElementById('cell-'+k).classList.toggle('active', k===key));
  ['a','b'].forEach(k => document.getElementById('result-'+k).classList.toggle('active', k===key));
}
function updateView(){
  ids.y.value = state.y;
  ids.x.value = state.x;
  ids.c.value = fmt(state.c);
  ids.a.value = fmt(state.a);
  ids.b.value = fmt(state.b);
  ids.miniY.textContent = state.y || 'y';
  ids.txtC.textContent = state.c ? fmt(state.c) : '-';
  ids.txtA.textContent = state.a ? fmt(state.a) : '-';
  ids.txtB.textContent = state.b ? fmt(state.b) : '-';

  const yVal = Math.abs(num(state.y) || 0);
  const rise = Math.max(10, Math.min(100, yVal || 0));
  const topY = 160 - rise;
  ids.pathA.setAttribute('d', `M 260 160 L 260 ${topY}`);
  ids.pathB.setAttribute('d', `M 40 160 L 260 ${topY}`);
  ids.txtA.setAttribute('x', 272);
  ids.txtA.setAttribute('y', 160 - (rise/2));
  ids.txtB.setAttribute('x', 130);
  ids.txtB.setAttribute('y', 160 - (rise/2) - 15);

  reportHeight();
}
function setState(next){
  state.y = next.y ?? '';
  state.x = next.x ?? '';
  state.c = next.c ?? '';
  state.a = next.a ?? '';
  state.b = next.b ?? '';
  updateView();
}

function recalcFromDriver(driver){
  const c = num(state.c);
  const y = num(state.y);
  const x = num(state.x);
  const a = num(state.a);
  const b = num(state.b);

  if (driver === 'y'){
    if (y === null) return setState({y:'', x:'', c: state.c, a:'', b:''});
    const nextX = ((Math.atan(y/100)*180)/Math.PI);
    if (c === null) return setState({y: state.y, x: nextX.toFixed(2).replace(/\.00$/,''), c:'', a:'', b:''});
    const nextA = (y/100) * c;
    const nextB = Math.sqrt(nextA*nextA + c*c);
    return setState({
      y: state.y,
      x: nextX.toFixed(2).replace(/\.00$/,''),
      c: state.c,
      a: String(roundInt(nextA)),
      b: String(roundInt(nextB))
    });
  }

  if (driver === 'x'){
    if (x === null) return setState({y:'', x:'', c: state.c, a:'', b:''});
    const nextY = 100 * Math.tan((x*Math.PI)/180);
    if (c === null) return setState({y: nextY.toFixed(2).replace(/\.00$/,''), x: state.x, c:'', a:'', b:''});
    const nextA = (nextY/100) * c;
    const nextB = Math.sqrt(nextA*nextA + c*c);
    return setState({
      y: nextY.toFixed(2).replace(/\.00$/,''),
      x: state.x,
      c: state.c,
      a: String(roundInt(nextA)),
      b: String(roundInt(nextB))
    });
  }

  if (driver === 'a'){
    if (a === null) return setState({y:'', x:'', c: state.c, a:'', b:''});
    if (c === null || c === 0) return setState({y:'', x:'', c: state.c, a: state.a, b:''});
    const nextY = (a / c) * 100;
    const nextX = ((Math.atan(a / c) * 180) / Math.PI);
    const nextB = Math.sqrt(a*a + c*c);
    return setState({
      y: nextY.toFixed(2).replace(/\.00$/,''),
      x: nextX.toFixed(2).replace(/\.00$/,''),
      c: state.c,
      a: state.a,
      b: String(roundInt(nextB))
    });
  }

  if (driver === 'b'){
    if (b === null) return setState({y:'', x:'', c: state.c, a:'', b:''});
    if (c === null || c === 0 || b < c) return setState({y:'', x:'', c: state.c, a:'', b: state.b});
    const nextA = Math.sqrt((b*b) - (c*c));
    const nextY = (nextA / c) * 100;
    const nextX = ((Math.atan(nextA / c) * 180) / Math.PI);
    return setState({
      y: nextY.toFixed(2).replace(/\.00$/,''),
      x: nextX.toFixed(2).replace(/\.00$/,''),
      c: state.c,
      a: String(roundInt(nextA)),
      b: state.b
    });
  }
}

function applyInput(field, raw){
  const v = clean(raw);
  state[field] = v;

  if (field === 'y'){
    state.driver = 'y';
    recalcFromDriver('y');
    return;
  }
  if (field === 'x'){
    state.driver = 'x';
    recalcFromDriver('x');
    return;
  }
  if (field === 'a'){
    state.driver = 'a';
    recalcFromDriver('a');
    return;
  }
  if (field === 'b'){
    state.driver = 'b';
    recalcFromDriver('b');
    return;
  }
  if (field === 'c'){
    recalcFromDriver(state.driver);
    return;
  }
}

function press(key){
  if (key === 'AC'){
    state.y=''; state.x=''; state.c=''; state.a=''; state.b=''; state.driver='y'; state.overwrite=true; updateView(); return;
  }
  if (key === 'C'){
    state[state.active]='';
    if (state.active === 'c') {
      recalcFromDriver(state.driver);
    } else {
      applyInput(state.active, '');
    }
    state.overwrite=true;
    return;
  }
  if (key === '+/-'){
    const cur = num(state[state.active]);
    if (cur !== null) applyInput(state.active, String(cur * -1));
    return;
  }
  if (key === 'ENTER'){
    const order = ['y','x','c','a','b'];
    const idx = order.indexOf(state.active);
    setActive(order[(idx + 1) % order.length]);
    return;
  }
  let cur = state[state.active] || '';
  if (key === '.' && !state.overwrite && cur.includes('.')) return;
  if (key === '00' && (state.overwrite || cur === '' || cur === '-')) return;
  const next = state.overwrite ? (key === '.' ? '0.' : key) : cur + key;
  state.overwrite = false;
  applyInput(state.active, next);
}

function reportHeight(){
  const h = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight);
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ type:'toolHeight', name:PAGE_NAME, height:h }, '*');
  }
}
window.addEventListener('load', ()=>{ setActive('c'); updateView(); setTimeout(reportHeight,120); });
window.addEventListener('resize', ()=> setTimeout(reportHeight,120));
window.addEventListener('orientationchange', ()=> setTimeout(reportHeight,120));
window.addEventListener('message', e => { if (e.data && e.data.type === 'requestHeight') setTimeout(reportHeight, 40); });
</script>
</body>
</html>
